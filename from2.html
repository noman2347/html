<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
   
    <form action="/action">
        <h1>Pete's Pizza Delivery</h1>
        <br>
        <h2>Online Order Form</h2>
        <p>*required fields</p>
        <fieldset>
            <legend>customer details</legend>
            <label for="name">Name</label>
            <input type="taxt" name="name" id="name"><br>
            <label for="address">Address</label>
            <input type="text" name="address" id="address"><br>
            <label for="town">Town/City</label>
            <input type="text" name="town" id="town"><br>
            <label for="post"> Postcode</label>
            <input type="text"  name="post" id="post"><br>
            <label for="tel">Tel:</label>
            <input type="number" name="tel" id="tel" ><br>
            <label for="email">Email</label>
            <input type="email"  name="email" id="email"> 
        </fieldset>
        <br>
  
                <div>
        <fieldset style="width: 150px;">
            <legend>topping</legend>
        
            <input type="radio" id="f" name="tooping">
                <label for="f">Margherita</label> <br>
            
            <input type="radio" id="j" name="tooping">
            <label for="j">four Seasons</label><br>
            <input type="radio" id="k" name="tooping">
            <label for="k">Meat Feast</label>    
        </fieldset>
        </div>
        <div>
        <fieldset style="width: 150px;">
        <legend>Size</legend>
        <input type="radio" id="l" name="small">
        <label for="l"> Small</label><br>
        <input type="radio" id="m" name="small">
        <label for="m"> Medium</label><br>
        <input type="radio" id="n" name="small">
        <label for="n"> large</label>
        </fieldset></div>
          <div>
        <fieldset style="width: 150px;">
        <legend>Extra</legend>
        <input type="checkbox" id="Mushrooms" name="Mushrooms">
        <label for="Mushrooms"> Mushrooms</label><br>
        <input type="checkbox" id="green" name="green">
        <label for="green"> Green peppers</label><br>
        <input type="checkbox" id="anchovies" name="anchovies">
        <label for="anchovies"> Anchovies</label><br>
        <input type="checkbox" id="Extra" name="Extra">
        <label for="Extra"> Extra cjeese</label>
        </fieldset></div>
        <div>
            <fieldset style="width: 300px;">
                <legend>Delivery</legend>
                <label>Preferred delivery time:</label>
                <input type="time" id="date" name="date">
                <label>Delivery instructions:</label>
                <textarea id="feedback" name="feedback" rows="2" cols="30"> </textarea>

            </fieldset>
        </div>
        <button type="submit">submit</button>

      
            
  

    </form> 
</body>
</html>
